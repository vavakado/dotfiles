theme = "rose_pine"

[editor]
line-number = "relative"
mouse = false
completion-trigger-len = 2
shell = ["bash", "-c"]
auto-save = true
bufferline = "multiple"


[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
right = ["diagnostics", "selections", "position", "file-encoding", "version-control"]
